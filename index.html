<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selamat Ulang Tahun Sayangku 🎂</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 untuk Pesan -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Library 3D Mewah (Three.js & OrbitControls) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <style>
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: #050510;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #050510 100%);
            overflow: hidden; 
            color: white;
            touch-action: none; 
        }

        #canvas-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        /* Layar Pembuka (Intro) */
        #intro {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px);
            z-index: 999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }

        .tap-icon {
            font-size: 80px; cursor: pointer; animation: bounce 2s infinite;
            filter: drop-shadow(0 0 30px rgba(255, 182, 193, 0.8));
        }

        .intro-text {
            margin-top: 20px; font-size: 18px; font-weight: 700;
            letter-spacing: 1px; text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 10; pointer-events: none; 
            display: flex; flex-direction: column;
            justify-content: space-between; padding: 40px 20px;
            opacity: 0; transition: opacity 2s ease;
        }

        .header-text { text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .header-text h1 { font-size: 24px; color: #ffb6c1; margin-bottom: 8px; line-height: 1.3; }
        .header-text p {
            font-size: 13px; color: #e0e0e0; background: rgba(0,0,0,0.5);
            display: inline-block; padding: 6px 16px; border-radius: 20px;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
        }

        .footer-controls { text-align: center; pointer-events: auto; margin-bottom: 20px; }
        .btn-pesan {
            background: rgba(255, 182, 193, 0.15); border: 2px solid #ffb6c1; color: white;
            padding: 14px 30px; border-radius: 50px; font-size: 15px; font-weight: bold;
            cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 182, 193, 0.2); animation: pulseBtn 2s infinite;
        }

        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 0 10px rgba(255,182,193,0.3); }
            50% { box-shadow: 0 0 25px rgba(255,182,193,0.7); transform: translateY(-2px); }
        }

        .swal2-popup { border-radius: 20px !important; border: 1px solid rgba(255, 182, 193, 0.3); }
    </style>
</head>
<body>

    <!-- Audio BGM (Lagu telah diperbarui) -->
    <audio id="bgm" src="https://feeldreams.github.io/djikhlas.mp3" loop></audio>

    <!-- Layar Intro -->
    <div id="intro">
        <div class="tap-icon" onclick="mulaiAplikasi()">🎁</div>
        <div class="intro-text">Pencet kadonya ya sayang...</div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div class="header-text">
            <h1>Selamat Ulang Tahun Yaa Sayangku,<br>Hanuf Maulidina 🎂❤️</h1>
            <p>Geser layar untuk memutar | Cubit untuk Zoom</p>
        </div>
        <div class="footer-controls">
            <button class="btn-pesan" onclick="bukaPesan()">Buka Pesan Ulang Tahunnya Yaa 💌</button>
        </div>
    </div>

    <!-- Tempat Objek 3D -->
    <div id="canvas-container"></div>

    <script>
        // --- 21 FOTO MILIKMU ---
        const daftarFoto = [
            "https://i.postimg.cc/7LFkz5N9/IMG-20250807-171041.jpg",
            "https://i.postimg.cc/XvRb5rgX/IMG-20250818-150058-594.webp",
            "https://i.postimg.cc/pdwHjmBB/IMG-20250818-161544.jpg",
            "https://i.postimg.cc/QM237FqB/IMG-20250908-121741-398.webp",
            "https://i.postimg.cc/XJ90kn2g/IMG-20250911-163519.jpg",
            "https://i.postimg.cc/QtcrJj61/IMG-20250912-231306.jpg",
            "https://i.postimg.cc/zBT1FqdF/IMG-20250915-133120-512.webp",
            "https://i.postimg.cc/yd0zy7fP/IMG-20250918-142815-834.webp",
            "https://i.postimg.cc/MT18mzs5/IMG-20250923-111622-593.webp",
            "https://i.postimg.cc/Px1kQd66/IMG-20251002-120946-968.webp",
            "https://i.postimg.cc/508MSf7d/IMG-20251006-155449.jpg",
            "https://i.postimg.cc/fLYhfMH6/IMG-20251015-WA0007.jpg",
            "https://i.postimg.cc/SRqbZH5v/IMG-20251021-174521.jpg",
            "https://i.postimg.cc/76Synqsk/IMG-20251024-204006.jpg",
            "https://i.postimg.cc/FzmXPw84/IMG-20251112-154510-846.webp",
            "https://i.postimg.cc/qq0HmWSH/IMG-20251120-113458-953.webp",
            "https://i.postimg.cc/Rh9xP2ym/IMG-20251127-135353-294.webp",
            "https://i.postimg.cc/SRqbZH3j/IMG-20251202-194227-246.webp",
            "https://i.postimg.cc/d3vcWgph/IMG-20251210-132349-969.webp",
            "https://i.postimg.cc/SRqbZH3z/IMG-20260201-220009.jpg",
            "https://i.postimg.cc/R0kBtWT4/Picsart-25-05-17-14-11-50-003.jpg"
        ];

        let scene, camera, renderer, controls;
        let bolaGrup = new THREE.Group(); 
        let isAppStarted = false;

        function mulaiAplikasi() {
            if (isAppStarted) return;
            isAppStarted = true;

            // Mainkan musik
            document.getElementById('bgm').play().catch(e => console.log('Autoplay dicegah'));

            // Sembunyikan intro perlahan
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('ui-layer').style.opacity = '1';
                
                init3D();
            }, 800);
        }

        function init3D() {
            const container = document.getElementById('canvas-container');

            // 1. Scene & Camera
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.0006);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 6000);
            camera.position.z = 2400; 

            // 2. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 3. OrbitControls (Zoom & Putar)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.enablePan = false; 
            controls.minDistance = 900;  
            controls.maxDistance = 4500; 

            scene.add(bolaGrup);

            // 4. Bangun Bola
            buatBolaFoto();

            // 5. Bintang
            buatBintang();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function buatBolaFoto() {
            const jumlahFoto = 60; 
            const radius = 850; 
            const phi = Math.PI * (3 - Math.sqrt(5)); 

            const textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin('anonymous'); 

            for (let i = 0; i < jumlahFoto; i++) {
                const y = 1 - (i / (jumlahFoto - 1)) * 2; 
                const radiusAtY = Math.sqrt(1 - y * y); 
                const theta = phi * i; 

                const targetX = Math.cos(theta) * radiusAtY * radius;
                const targetY = y * radius;
                const targetZ = Math.sin(theta) * radiusAtY * radius;
                const targetPosition = new THREE.Vector3(targetX, targetY, targetZ);

                // --- BIKIN KARTU POLAROID UKURAN BESAR ---
                const polaroidGrup = new THREE.Group();

                const bgGeo = new THREE.PlaneGeometry(240, 280);
                const bgMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
                const bgMesh = new THREE.Mesh(bgGeo, bgMat);
                polaroidGrup.add(bgMesh);

                const photoGeo = new THREE.PlaneGeometry(220, 220);
                const photoMat = new THREE.MeshBasicMaterial({ color: 0xffb6c1 }); 
                const photoMesh = new THREE.Mesh(photoGeo, photoMat);
                photoMesh.position.y = 20; 
                photoMesh.position.z = 2;  
                polaroidGrup.add(photoMesh);

                polaroidGrup.position.copy(targetPosition);
                polaroidGrup.lookAt(new THREE.Vector3(0, 0, 0));
                polaroidGrup.rotateY(Math.PI); 

                bolaGrup.add(polaroidGrup);

                const indexGambar = i % daftarFoto.length;
                textureLoader.load(
                    daftarFoto[indexGambar],
                    function(texture) {
                        texture.minFilter = THREE.LinearFilter;
                        photoMesh.material.map = texture;
                        photoMesh.material.color.setHex(0xffffff); 
                        photoMesh.material.needsUpdate = true;
                    }
                );

                // --- ANIMASI MELEDAK DARI TENGAH ---
                polaroidGrup.position.set(0, 0, 0);
                new TWEEN.Tween(polaroidGrup.position)
                    .to({ x: targetPosition.x, y: targetPosition.y, z: targetPosition.z }, Math.random() * 2500 + 1500)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();
            }
        }

        function buatBintang() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000;
            const posArray = new Float32Array(starsCount * 3);

            for(let i = 0; i < starsCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 5000;
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const starsMaterial = new THREE.PointsMaterial({
                size: 3.5, color: 0xffe6e6, transparent: true, opacity: 0.7
            });

            const starMesh = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starMesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();

            // Putar bola perlahan otomatis
            if (bolaGrup) {
                bolaGrup.rotation.y -= 0.0008;
                bolaGrup.rotation.x += 0.0004;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- PESAN BUCIN DENGAN NOMOR WA YANG BARU ---
        function bukaPesan() {
            Swal.fire({
                title: 'Happy Birthday Sayangku, Hanuf Maulidina 🥳🤍',
                html: `
                    <div style="text-align: left; font-size: 14.5px; line-height: 1.7;">
                        <p>Selamat bertambah usia yaa, kesayanganku! Di hari spesial ini, aku berdoa semoga kamu selalu sehat, bahagia terus, dan dilancarkan semua urusannya. ✨</p><br>
                        
                        <p>Sengaja aku rakit galeri kenangan ini khusus sebagai hadiah kecil buat kamu. Biar kamu bisa lihat lagi perjalanan cerita kita dan seneng terus di hari ulang tahunmu ini.</p><br>
                        
                        <p>Coba deh puter-puter fotonya. Liat kan? Sama kayak bumi yang terus berputar, kamu itu pusat duniaku yang selalu bikin hari-hariku jadi lebih berwarna.</p><br>
                        
                        <p>Semoga semua cita-cita dan harapan baikmu segera terwujud ya, sayang. Aku janji bakal terus ada di sampingmu buat nemenin kamu meraih mimpi-mimpimu.</p><br>
                        
                        <p style="text-align:center;"><b>I Love You so much! 🚀❤️</b></p>
                    </div>
                `,
                background: '#1a1a2e',
                color: '#fff',
                confirmButtonText: 'Balas Pesannya Yaa 💌',
                confirmButtonColor: '#ffb6c1',
                backdrop: `rgba(5, 5, 16, 0.9)`
            }).then((result) => {
                if (result.isConfirmed) {
                    let nomorWA = "6287763413521"; 
                    let pesanWA = "Aaaa sayanggg... Makasih banyak yaa ucapan ulang tahun sama kado webnya! Aku jadi terharu dan senyum terus liat foto kita 😭🌎🤍";
                    window.location.href = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${encodeURIComponent(pesanWA)}`;
                }
            });
        }
    </script>
</body>
</html>
